<div class="contactform-content">
  <form [formGroup]="contactForm" (ngSubmit)="formSubmit()">
    <div class="form-top">
      <div class="name">
        <h4>What's your name?</h4>
        <input type="text" formControlName="fullname" placeholder="Your name goes here" />
      </div>
      <div class="email">
        <h4>What's your email?</h4>
        <input type="email" formControlName="mail" placeholder="youremail@emailcom" />
      </div>
    </div>
    <div class="form-mid">
      <div class="text">
        <h4>How can I help you?</h4>
        <input
          type="text"
          formControlName="message"
          placeholder="Hello Nadine, I am interested in..."
        />
      </div>
    </div>
    <div class="form-label">
      <label>
        <div class="checkbox-wrapper">
          <input class="checkbox" type="checkbox" formControlName="check" />
        </div>
        I've read the <a href="">privacy policy</a> and agree to the processing of my data.
      </label>
      <p class="error-label">Please accept the privacy policy</p>
    </div>
    <div class="submit">
      <button class="btn-primary" type="submit">Drop a line</button>
    </div>
  </form>
</div>
